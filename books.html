<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let me recommend you a book!</title>

    <style>

      body {
        font-family: Georgia, serif;
        background-color: #f5f0e8;
        color: #1a1208;
        margin: 0;
        padding: 0;
      }

      .screen {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.2rem;
        color: #6b5f4a;
        max-width: 480px;
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      .btn {
        background-color: #6b2d0f;
        color: #f5f0e8;
        border: none;
        padding: 1rem 2.5rem;
        font-family: Georgia, serif;
        font-size: 1.1rem;
        border-radius: 20px;
        cursor: pointer;
      }

      .btn:hover {
        background-color: #8b3d1f;
      }

    </style>
  </head>

  <body>

    <div class="screen" id="welcome-screen">
      <h1>Let me recommend you a book!</h1>
      <p>Answer a few questions and I'll recommend three books from my hoarding situation.</p>
      <button class="btn" id="start-btn">Click to start →</button>
    </div>

    <script>

      const startBtn = document.getElementById('start-btn');

      startBtn.addEventListener('click', function() {
        alert('lmao you fell for it');
      });
    </script>

  </body>

</html>
