<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let me recommend you a book!</title>

    <style>

      body {
        font-family: Georgia, serif;
        background-color: #f5f0e8;
        color: #1a1208;
        margin: 0;
        padding: 0;
      }

      .screen {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.2rem;
        color: #6b5f4a;
        max-width: 480px;
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      .btn {
        background-color: #6b2d0f;
        color: #f5f0e8;
        border: none;
        padding: 1rem 2.5rem;
        font-family: Georgia, serif;
        font-size: 1.1rem;
        border-radius: 20px;
        cursor: pointer;
      }

      .btn:hover {
        background-color: #8b3d1f;
      }

    </style>
  </head>

  <body>

    <div class="screen" id="welcome-screen">
      <h1>Let me recommend you a book!</h1>
      <p>Answer a few questions and I'll recommend three books from my hoarding situation.</p>
      <button class="btn" id="start-btn">Click to start →</button>
    </div>

    <script>
      // ── BOOK DATA ──────────────────────────────────────
      //
      //   difficulty: 1 = light, 2 = moderate, 3 = dense
      //   length: 1 = short, 2 = medium, 3 = long, will replace with # of pages later
      //   rating: out of 5
      // mood tags are what the algorithm matches against, use lowercase

      const books = [
        {
          title:      "The Master and Margarita",
          author:     "Mikhail Bulgakov",
          genre:      "Fantasy",
          difficulty: 3,
          length:     3,
          mood:       ["mysterious", "dreamlike", "atmospheric"],
          subjects:   ["identity", "commentary", "magic"],
          rating:     3,
          note:       "Read the Bible before reading this one"
        },
        {
          title:      "Return to the Hundred Acre Wood",
          author:     "David Benedictus",
          genre:      "Children",
          difficulty: 1,
          length:     2,
          mood:       ["warm", "intimate", "whimsical", "nostalgic"],
          subjects:   ["friendships", "animals", "youth"],
          rating:     4,
          note:       "My favourite childhood book."
        },
        {
          title:      "Normal People",
          author:     "Sally Rooney",
          genre:      "Literary fiction",
          difficulty: 1,
          length:     2,
          mood:       ["emotional", "intimate", "quiet", "contemporary"],
          subjects:   ["relationships", "class", "ireland", "youth"],
          rating:     1,
          note:       "This book sucked. If this shows up I am genuinely sorry."
        },
        {
          title:      "Marabou Stork Nightmares",
          author:     "Irvine Welsh",
          genre:      "Literary fiction",
          difficulty: 3,
          length:     2,
          mood:       ["dark", "unsettling", "violent", "contemporary", "unconventional"],
          subjects:   ["relationships", "class", "scotland", "violence"],
          rating:     5,
          note:       "One of the best reads of this century, unsettling, witty, and has such a unique voice."
        },
        {
          title:      "Perfume: the story of a murderer",
          author:     "Patrick Suskind",
          genre:      "Literary fiction",
          difficulty: 2,
          length:     2,
          mood:       ["absurd", "exciting", "unconventional", "dark"],
          subjects:   ["scent", "class", "france", "nature"],
          rating:     5,
          note:       "This book is a wild ride"
        },
        {
          title:      "The Martian",
          author:     "Andy Weir",
          genre:      "Science fiction",
          difficulty: 2,
          length:     2,
          mood:       ["adventurous", "witty", "hopeful", "exciting"],
          subjects:   ["space", "science", "survival", "mars"],
          rating:     3,
          note:       "Great for book clubs"
        }
      ];

      
      console.log('Total books:', books.length);
      console.log('First book title:', books[0].title);
      console.log('First book mood tags:', books[0].mood);

      // ── BUTTON ─────────────────────────────────────────────

      const startBtn = document.getElementById('start-btn');

      startBtn.addEventListener('click', function() {
        alert('loaded! ' + books.length + ' books ready.');
      });

    </script>

  </body>

</html>
