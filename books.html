<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let me recommend you a book!</title>

    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background-color: #f5f0e8;
      color: #1a1208;
      min-height: 100vh;
    }
/* ── QUESTION SCREENS ──────────────────────────────── */
    .screen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .screen.active { display: flex; }

    /* ── TYPOGRAPHY ───────────────────────────── */
    .question-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b5f4a;
      margin-bottom: 1rem;
    }

    h1 { font-size: 2.8rem; margin-bottom: 1rem; line-height: 1.2; }
    h2 { font-size: 2rem;   margin-bottom: 0.5rem; line-height: 1.3; }

    .subtitle {
      font-size: 1.1rem;
      color: #6b5f4a;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    /* ── OPTION BUTTONS ───────────────────────── */
    /* These are the clickable answer choices.
       They stack vertically, max width 480px. */
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
    }

    .option-btn {
      background: white;
      border: 2px solid #d4c9aa;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      font-family: Georgia, serif;
      font-size: 1.05rem;
      color: #1a1208;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.4;
    }

    .option-btn:hover {
      border-color: #6b2d0f;
      background: #fdf8f0;
    }

    /* The selected state — added by JavaScript on click */
    .option-btn.selected {
      border-color: #6b2d0f;
      background: #6b2d0f;
      color: #f5f0e8;
    }

    /* ── PROGRESS BAR ─────────────────────────── */
    .progress-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: #d4c9aa;
    }

    .progress-bar {
      height: 100%;
      background: #6b2d0f;
      transition: width 0.4s ease;
    }

    /* ── NAVIGATION ───────────────────────────── */
    .nav {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      background-color: #6b2d0f;
      color: #f5f0e8;
      border: none;
      padding: 0.9rem 2rem;
      font-family: Georgia, serif;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background-color: #8b3d1f; }
    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: none;
      border: none;
      color: #6b5f4a;
      font-family: Georgia, serif;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.9rem 1rem;
    }
    .btn-ghost:hover { color: #1a1208; }
    </style>
  </head>

  <body>

    <!--PROGRESS BAR-->
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!--SCREEN 1: WELCOME-->

    <div class="screen active" id="screen-welcome">
      <h1>Let me recommend you a book!</h1>
      <p class="subtitle">Answer four questions and I'll recommend three books from my hoarding situation.</p>
      <button class="btn" id="start-btn">Click to start!</button>
    </div>

    <!--SCREEN 2: QUESTIONS-->
    <div class="screen" id="screen-question">
      <p class="question-label" id="question-counter">Question 1 of 4</p>
      <h2 id="question-text">Question goes here</h2>
      <p class="subtitle" id="question-hint"></p>

      <!-- Options go here, injected by JavaScript -->
      <div class="options" id="options-container"></div>

      <div class="nav">
        <button class="btn-ghost" id="back-btn">← Back</button>
        <button class="btn" id="next-btn" disabled>Next →</button>
      </div>
    </div>
    
    <!-- ── SCREEN 3: RESULTS (placeholder) ───── -->
    <div class="screen" id="screen-results">
      <h1>Your recommendations</h1>
      <p class="subtitle" id="results-preview"></p>
      <button class="btn" id="restart-btn">Start again</button>
    </div>

    <script>
      // ── BOOK DATA ──────────────────────────────────────
      //
      //   difficulty: 1 = light, 2 = moderate, 3 = dense
      //   length: 1 = short, 2 = medium, 3 = long, will replace with # of pages later
      //   rating: out of 5
      //   mood tags are what the algorithm matches against, use lowercase

      const books = [
        {
          title:      "The Master and Margarita",
          author:     "Mikhail Bulgakov",
          genre:      "Fantasy",
          difficulty: 3,
          length:     3,
          mood:       ["mysterious", "dreamlike", "atmospheric"],
          subjects:   ["identity", "commentary", "magic"],
          rating:     3,
          note:       "Read the Bible before reading this one"
        },
        {
          title:      "Return to the Hundred Acre Wood",
          author:     "David Benedictus",
          genre:      "Children",
          difficulty: 1,
          length:     2,
          mood:       ["warm", "intimate", "whimsical", "nostalgic", "gentle"],
          subjects:   ["friendships", "animals", "youth"],
          rating:     4,
          note:       "My favourite childhood book."
        },
        {
          title:      "Normal People",
          author:     "Sally Rooney",
          genre:      "Literary fiction",
          difficulty: 1,
          length:     2,
          mood:       ["emotional", "intimate", "quiet", "contemporary"],
          subjects:   ["relationships", "class", "ireland", "youth"],
          rating:     1,
          note:       "This book sucked. If this shows up I am genuinely sorry."
        },
        {
          title:      "Marabou Stork Nightmares",
          author:     "Irvine Welsh",
          genre:      "Literary fiction",
          difficulty: 3,
          length:     2,
          mood:       ["dark", "unsettling", "violent", "contemporary", "unconventional"],
          subjects:   ["relationships", "class", "scotland", "violence"],
          rating:     5,
          note:       "One of the best reads of this century, unsettling, witty, and has such a unique voice."
        },
        {
          title:      "Perfume: the story of a murderer",
          author:     "Patrick Suskind",
          genre:      "Literary fiction",
          difficulty: 2,
          length:     2,
          mood:       ["absurd", "exciting", "unconventional", "dark"],
          subjects:   ["scent", "class", "france", "nature"],
          rating:     5,
          note:       "This book is a wild ride"
        },
        {
          title:      "The Martian",
          author:     "Andy Weir",
          genre:      "Science fiction",
          difficulty: 2,
          length:     2,
          mood:       ["adventurous", "witty", "intellectual", "exciting"],
          subjects:   ["space", "science", "survival", "mars"],
          rating:     3,
          note:       "Great for book clubs"
        }
      ];

      // ── QUESTIONS ─────────────────────────────────────────────
      //
      //   text: the actual Q
      //   hint: some extra context
      //   field: which key this question maps to
      //   options: possible answers
      //    label: answer seen by user
      //    value: what gets stored

      const questions = [
      {
        text:  "What mood are you in?",
        hint:  "",
        field: "mood",
        options: [
          { label: "Warm and comforting",        value: ["warm", "gentle", "hopeful", "nostalgic"] },
          { label: "Dark and atmospheric",        value: ["dark", "atmospheric", "mysterious", "unsettling"] },
          { label: "Exciting and adventurous",    value: ["adventurous", "exciting", "witty", "hopeful", "absurd"] },
          { label: "Quiet and contemplative",     value: ["quiet", "intimate", "emotional", "dreamlike"] },
          { label: "Intellectual and absorbing",  value: ["intellectual", "atmospheric", "dark", "mysterious"] }
        ]
      },
      {
        text:  "How much time do you have?",
        hint:  "Be honest, you don't look smart holding a big unfinished book.",
        field: "length",
        options: [
          { label: "I want something short, maybe something under 250 pages",  value: 1 },
          { label: "A medium-length book, 250–500 pages",       value: 2 },
          { label: "Give me your worst", value: 3 }
        ]
      },
      {
        text:  "How do you like to read?",
        hint:  "Think about the last book you really loved.",
        field: "difficulty",
        options: [
          { label: "Easy breezy reading",  value: 1 },
          { label: "Some depth, I don't mind slowing down",       value: 2 },
          { label: "Dense and demanding (like the men I date)",  value: 3 }
        ]
      },
      {
        text:  "What draws you in?",
        hint:  "Pick the theme that excites you most right now.",
        field: "subject",
        options: [
          { label: "History, place, and atmosphere",   value: ["history", "place", "medieval history", "russia"] },
          { label: "Identity, relationships, emotion", value: ["identity", "relationships", "youth", "women"] },
          { label: "Magic, myth, and the uncanny",     value: ["magic", "greek mythology", "memory", "place"] },
          { label: "Science, adventure, the unknown",  value: ["space", "science", "survival", "friendship"] }
        ]
      }
    ];

    // ── STATE ────────────────────────────────────────────────
    //
    // currentQ: index for current Q #
    // answers: selections so far

    let currentQ = 0;

    let answers = {
      mood:       null,
      difficulty: null,
      length:     null,
      subject:    null
    };

    // ── SCREEN SWITCHING ─────────────────────────────────────
    //
    // This function takes a screen id and makes only that screen visible.
    // It loops through all screens, removes 'active' from all of them,
    // then adds 'active' to just the one you want.

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(screen) {
        screen.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }


    // ── RENDER QUESTION ──────────────────────────────────────
    //
    // This function reads the current question from the array
    // and builds the HTML for it. It's called every time the
    // reader moves forward or backward.

    function renderQuestion() {
      const q = questions[currentQ];

      // Update the counter label and question text
      document.getElementById('question-counter').textContent =
        'Question ' + (currentQ + 1) + ' of ' + questions.length;
      document.getElementById('question-text').textContent = q.text;
      document.getElementById('question-hint').textContent = q.hint;

      // Build the option buttons from the question's options array.
      // .map() transforms each option object into an HTML string.
      // We store the option index in a data-index attribute so we
      // can retrieve it when the reader clicks.
      const container = document.getElementById('options-container');
      container.innerHTML = q.options.map(function(option, index) {
        return '<button class="option-btn" data-index="' + index + '">'
               + option.label
             + '</button>';
      }).join('');

      // If this question was already answered (reader went back),
      // re-highlight their previous selection.
      const alreadyChosen = answers[q.field];
      if (alreadyChosen !== null) {
        // Find which option index matches the stored answer
        q.options.forEach(function(option, index) {
          if (JSON.stringify(option.value) === JSON.stringify(alreadyChosen)) {
            container.children[index].classList.add('selected');
          }
        });
        document.getElementById('next-btn').disabled = false;
      } else {
        document.getElementById('next-btn').disabled = true;
      }

      // Update the progress bar.
      // currentQ / questions.length gives a fraction (e.g. 0.5 = 50%).
      // Multiply by 100 to get a percentage for the CSS width.
      const pct = (currentQ / questions.length) * 100;
      document.getElementById('progress-bar').style.width = pct + '%';

      // Show or hide the Back button
      document.getElementById('back-btn').style.visibility =
        currentQ === 0 ? 'hidden' : 'visible';
    }


    // ── OPTION CLICK HANDLER ─────────────────────────────────
    //
    // We attach ONE listener to the container, not one per button.
    // This is called "event delegation" — the click bubbles up
    // from the button to the container, and we check what was clicked.
    // It's more efficient and works even when buttons are rebuilt.

    document.getElementById('options-container').addEventListener('click', function(event) {

      // Find the button that was clicked.
      // .closest() walks up the DOM tree to find the nearest
      // matching element — handles clicks on child elements safely.
      const btn = event.target.closest('.option-btn');
      if (!btn) return; // clicked somewhere that wasn't a button

      const q = questions[currentQ];
      const index = parseInt(btn.getAttribute('data-index'));
      const chosen = q.options[index].value;

      // Store the answer
      answers[q.field] = chosen;

      // Remove 'selected' from all buttons, then add to clicked one
      document.querySelectorAll('.option-btn').forEach(function(b) {
        b.classList.remove('selected');
      });
      btn.classList.add('selected');

      // Enable the Next button now that an answer is chosen
      document.getElementById('next-btn').disabled = false;
    });


    // ── NEXT BUTTON ──────────────────────────────────────────

    document.getElementById('next-btn').addEventListener('click', function() {
      if (currentQ < questions.length - 1) {
        // More questions remain — advance and re-render
        currentQ++;
        renderQuestion();
      } else {
        // All questions answered — go to results
        showScreen('screen-results');
        document.getElementById('progress-bar').style.width = '100%';

        // PLACEHOLDER show a summary of answers
        document.getElementById('results-preview').textContent =
          'Mood: '       + JSON.stringify(answers.mood)       + ' | ' +
          'Length: '     + answers.length                     + ' | ' +
          'Difficulty: ' + answers.difficulty                 + ' | ' +
          'Subject: '    + JSON.stringify(answers.subject);
      }
    });


    // ── BACK BUTTON ──────────────────────────────────────────

    document.getElementById('back-btn').addEventListener('click', function() {
      if (currentQ > 0) {
        currentQ--;
        renderQuestion();
      }
    });


    // ── START BUTTON ─────────────────────────────────────────

    document.getElementById('start-btn').addEventListener('click', function() {
      currentQ = 0;
      answers = { mood: null, difficulty: null, length: null, subject: null };
      showScreen('screen-question');
      document.getElementById('progress-wrap').style.display = 'block';
      renderQuestion();
    });


    // ── RESTART BUTTON ───────────────────────────────────────

    document.getElementById('restart-btn').addEventListener('click', function() {
      document.getElementById('progress-wrap').style.display = 'none';
      showScreen('screen-welcome');
    });

    </script>

  </body>

</html>
